name: hopssh-control-plane
runtime: yaml
description: "Deploy hopssh control plane on a single OCI instance with public IP"

meta:
  displayName: hopssh Control Plane

config:
  compartmentId:
    type: string
  imageId:
    type: string
    default: ""
    description: "OCI image OCID (Ubuntu 22.04 or Oracle Linux 9)"
  sshPublicKey:
    type: string
    default: ""
    description: "SSH public key for instance access"
  shape:
    type: string
    default: "VM.Standard.A1.Flex"
    description: "Instance shape (ARM free tier eligible)"
  ocpus:
    type: string
    default: "2"
  memoryInGbs:
    type: string
    default: "12"

variables:
  availabilityDomains:
    fn::invoke:
      function: oci:Identity/getAvailabilityDomains:getAvailabilityDomains
      arguments:
        compartmentId: ${oci:tenancyOcid}
      return: availabilityDomains

resources:
  # --- section: networking ---
  vcn:
    type: oci:Core/vcn:Vcn
    properties:
      compartmentId: {{ .Config.compartmentId }}
      cidrBlocks: ["10.0.0.0/16"]
      displayName: "hopssh-vcn"
      dnsLabel: "hopssh"
  igw:
    type: oci:Core/internetGateway:InternetGateway
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "hopssh-igw"
      enabled: "true"
    options:
      dependsOn:
        - ${vcn}
  route-table:
    type: oci:Core/routeTable:RouteTable
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "hopssh-rt"
      routeRules: [{ destination: "0.0.0.0/0", networkEntityId: "${igw.id}" }]
    options:
      dependsOn:
        - ${igw}
  nsg:
    type: oci:Core/networkSecurityGroup:NetworkSecurityGroup
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      displayName: "hopssh-nsg"
    options:
      dependsOn:
        - ${vcn}
  # SSH
  nsg-ssh:
    type: oci:Core/networkSecurityGroupSecurityRule:NetworkSecurityGroupSecurityRule
    properties:
      networkSecurityGroupId: ${nsg.id}
      direction: INGRESS
      protocol: "6"
      source: "0.0.0.0/0"
      sourceType: CIDR_BLOCK
      tcpOptions:
        destinationPortRange: { min: 22, max: 22 }
  # hopssh API + Dashboard
  nsg-api:
    type: oci:Core/networkSecurityGroupSecurityRule:NetworkSecurityGroupSecurityRule
    properties:
      networkSecurityGroupId: ${nsg.id}
      direction: INGRESS
      protocol: "6"
      source: "0.0.0.0/0"
      sourceType: CIDR_BLOCK
      tcpOptions:
        destinationPortRange: { min: 9473, max: 9473 }
  # Nebula lighthouse (UDP)
  nsg-nebula:
    type: oci:Core/networkSecurityGroupSecurityRule:NetworkSecurityGroupSecurityRule
    properties:
      networkSecurityGroupId: ${nsg.id}
      direction: INGRESS
      protocol: "17"
      source: "0.0.0.0/0"
      sourceType: CIDR_BLOCK
      udpOptions:
        destinationPortRange: { min: 42001, max: 42100 }
  # DNS server (UDP)
  nsg-dns:
    type: oci:Core/networkSecurityGroupSecurityRule:NetworkSecurityGroupSecurityRule
    properties:
      networkSecurityGroupId: ${nsg.id}
      direction: INGRESS
      protocol: "17"
      source: "0.0.0.0/0"
      sourceType: CIDR_BLOCK
      udpOptions:
        destinationPortRange: { min: 15300, max: 15400 }
  # Egress all
  nsg-egress:
    type: oci:Core/networkSecurityGroupSecurityRule:NetworkSecurityGroupSecurityRule
    properties:
      networkSecurityGroupId: ${nsg.id}
      direction: EGRESS
      protocol: all
      destination: "0.0.0.0/0"
      destinationType: CIDR_BLOCK
  subnet:
    type: oci:Core/subnet:Subnet
    properties:
      compartmentId: {{ .Config.compartmentId }}
      vcnId: ${vcn.id}
      cidrBlock: "10.0.1.0/24"
      displayName: "hopssh-subnet"
      dnsLabel: "hopssh"
      routeTableId: ${route-table.id}
      prohibitPublicIpOnVnic: "false"
      dhcpOptionsId: ${vcn.defaultDhcpOptionsId}
    options:
      dependsOn:
        - ${route-table}
  # --- section: compute ---
  instance:
    type: oci:Core/instance:Instance
    properties:
      compartmentId: {{ .Config.compartmentId }}
      availabilityDomain: ${availabilityDomains[0].name}
      shape: "{{ .Config.shape }}"
      displayName: "hopssh-control-plane"
      sourceDetails: { sourceType: "image", sourceId: "{{ .Config.imageId }}" }
      createVnicDetails:
        subnetId: "${subnet.id}"
        assignPublicIp: true
        nsgIds: ["${nsg.id}"]
      metadata:
        ssh_authorized_keys: "{{ .Config.sshPublicKey }}"
      shapeConfig: { ocpus: {{ .Config.ocpus }}, memoryInGbs: {{ .Config.memoryInGbs }} }
    options:
      dependsOn:
        - ${subnet}

outputs:
  instancePublicIp: ${instance.publicIp}
  dashboardUrl: http://${instance.publicIp}:9473
  sshCommand: ssh ubuntu@${instance.publicIp}
