name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Vendor dependencies + apply patches
        run: make setup

      - name: Build frontend
        run: make frontend-embed

      - name: Build
        run: make build

      - name: Vet
        run: make vet

      - name: Test
        run: make test

  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Vendor dependencies + apply patches
        run: make setup

      - name: Build frontend
        run: make frontend-embed

      - name: Build linux/${{ matrix.goarch }}
        run: make build-linux GOARCH=${{ matrix.goarch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-${{ matrix.goarch }}
          path: |
            hop-agent-linux-${{ matrix.goarch }}
            hop-server-linux-${{ matrix.goarch }}

  check-patches:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Check if Nebula patch is still needed
        env:
          GH_TOKEN: ${{ github.token }}
        run: make check-patches
        continue-on-error: true
