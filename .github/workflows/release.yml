name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: |
          cd frontend && npm ci && npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/build/

  build:
    needs: frontend
    # Per-target runner selection: darwin builds on macos-latest with
    # CGO_ENABLED=1 so vendor patch 19's pthread_set_qos_class_self_np
    # CGO calls are actually included in the released binary (the
    # released binary is what end-user macOS agents pick up via self-
    # update from the control plane, so this is the only path that
    # delivers the −17 % RTT win in production). Linux + Windows stay
    # on ubuntu-latest with CGO_ENABLED=0 — they have no CGO code in
    # the agent and cross-compile cleanly.
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            cgo: '0'
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            cgo: '0'
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            cgo: '1'
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            cgo: '1'
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            cgo: '0'
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
            cgo: '0'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Vendor + patch
        run: make setup

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: internal/frontend/dist/

      - name: Build agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          LDFLAGS="-s -w -X github.com/trustos/hopssh/internal/buildinfo.Version=${{ github.ref_name }} -X github.com/trustos/hopssh/internal/buildinfo.Commit=${{ github.sha }}"
          go build -mod=vendor -trimpath -ldflags="$LDFLAGS" \
            -o hop-agent-${GOOS}-${GOARCH}${EXT} ./cmd/agent

      - name: Build server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          LDFLAGS="-s -w -X github.com/trustos/hopssh/internal/buildinfo.Version=${{ github.ref_name }} -X github.com/trustos/hopssh/internal/buildinfo.Commit=${{ github.sha }}"
          go build -mod=vendor -trimpath -ldflags="$LDFLAGS" \
            -o hop-server-${GOOS}-${GOARCH}${EXT} ./cmd/server

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: hop-*-${{ matrix.goos }}-${{ matrix.goarch }}*

  docker:
    needs: frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: internal/frontend/dist/

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/trustos/hopssh:${{ github.ref_name }}
            ghcr.io/trustos/hopssh:latest
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binaries-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum hop-* > SHA256SUMS
          cat SHA256SUMS

      - name: Copy install script
        run: cp scripts/install.sh dist/install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/hop-*
            dist/SHA256SUMS
            dist/install.sh
